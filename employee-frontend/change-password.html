<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synergy — Change Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1>⚡ Synergycom</h1>
            <p>Employee Portal</p>
        </div>
        <nav class="sidebar-nav">
            <a href="employee-dashboard.html"><span class="icon">🏠</span> Dashboard</a>
            <a href="change-password.html" class="active"><span class="icon">🔑</span> Change Password</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="avatar" id="avatar-initials">E</div>
                <div class="user-info">
                    <p id="user-name">Employee</p>
                    <span id="user-role">Employee</span>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <p class="page-title">Change Password</p>

        <div style="max-width:480px">
            <div class="card">
                <div class="alert alert-success" id="success-alert"></div>
                <div class="alert alert-error" id="error-alert"></div>

                <div class="form-group">
                    <label>Current Password *</label>
                    <input type="password" id="old_password" placeholder="Enter current password" />
                </div>
                <div class="form-group">
                    <label>New Password *</label>
                    <input type="password" id="new_password" placeholder="Enter new password" />
                </div>
                <div class="form-group">
                    <label>Confirm New Password *</label>
                    <input type="password" id="confirm_password" placeholder="Confirm new password" />
                </div>

                <button class="btn btn-primary btn-full" onclick="changePassword()" id="submit-btn">
                    🔑 Change Password
                </button>
            </div>

            <div class="card" style="background:#FEF3C7;border:1px solid #FCD34D">
                <p style="font-size:13px;color:#92400E;font-weight:600;margin-bottom:8px">⚠️ Password Requirements</p>
                <ul style="font-size:13px;color:#92400E;padding-left:16px">
                    <li>At least 8 characters long</li>
                    <li>Must not be similar to your email</li>
                    <li>Must not be a commonly used password</li>
                    <li>Must not be entirely numeric</li>
                </ul>
            </div>
        </div>
    </main>
</div>

<script>
    const API = 'http://127.0.0.1:8000/api';
    const token = localStorage.getItem('access_token');
    if (!token) window.location.href = 'index.html';

    const name = localStorage.getItem('employee_name') || 'Employee';
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-role').textContent = localStorage.getItem('role_name') || 'Employee';
    document.getElementById('avatar-initials').textContent = name.charAt(0).toUpperCase();

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    function showSuccess(msg) {
        const el = document.getElementById('success-alert');
        el.textContent = msg; el.classList.add('show');
        document.getElementById('error-alert').classList.remove('show');
    }

    function showError(msg) {
        const el = document.getElementById('error-alert');
        el.textContent = msg; el.classList.add('show');
        document.getElementById('success-alert').classList.remove('show');
    }

    async function changePassword() {
        const old_password = document.getElementById('old_password').value;
        const new_password = document.getElementById('new_password').value;
        const confirm_password = document.getElementById('confirm_password').value;
        const btn = document.getElementById('submit-btn');

        if (!old_password || !new_password || !confirm_password) {
            showError('Please fill all fields');
            return;
        }

        if (new_password !== confirm_password) {
            showError('New passwords do not match');
            return;
        }

        if (new_password.length < 8) {
            showError('Password must be at least 8 characters');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Changing...';

        try {
            const res = await fetch(`${API}/accounts/change-password/`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ old_password, new_password, confirm_password })
            });
            const data = await res.json();

            if (res.ok) {
                showSuccess('Password changed successfully! Please login again.');
                document.getElementById('old_password').value = '';
                document.getElementById('new_password').value = '';
                document.getElementById('confirm_password').value = '';

                setTimeout(() => {
                    localStorage.clear();
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                showError(data.message || 'Failed to change password');
            }
        } catch (e) {
            showError('Something went wrong');
        }

        btn.disabled = false;
        btn.textContent = '🔑 Change Password';
    }
</script>
</body>
</html>
